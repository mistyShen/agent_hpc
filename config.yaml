project:
  name: cpu_ai_drug_design
  local_root: .
  server_root: /shared/shen/cpu_ai_drug_design
  logs_dir: 07_results/logs
  temp_dir: 07_results/tmp
  module_results_dir: 07_results/modules
  run_manifest: 07_results/run_manifest.json
  report_json: 09_reports/benchmark_summary.json
  report_markdown: 09_reports/benchmark_summary.md
  project_summary_json: 09_reports/project_summary.json
  project_summary_markdown: 09_reports/project_summary.md

execution:
  framework: snakemake
  profile: local
  cores: 1
  rerun_incomplete: true
  keep_going: false

benchmark:
  mode: scaffold_only
  datasets_manifest: 04_metadata/datasets.tsv
  targets_manifest: 04_metadata/targets.tsv
  compound_libraries_manifest: 04_metadata/compound_libraries.tsv
  benchmark_cases_manifest: 04_metadata/benchmark_cases.tsv

modules:
  benchmark_run_manifest:
    enabled: true
    output_path: 07_results/run_manifest.json
  target_preparation:
    enabled: true
    input_manifest: 04_metadata/targets.tsv
    output_dir: 07_results/modules/target_preparation
  compound_library_preparation:
    enabled: true
    input_manifest: 04_metadata/compound_libraries.tsv
    output_dir: 07_results/modules/compound_library_preparation
  classical_docking:
    enabled: true
    input_manifest: 04_metadata/benchmark_cases.tsv
    output_dir: 07_results/modules/classical_docking
    backend: vina_cpu
    backend_env_prefix: /shared/shen/2026/lax_fur_docking/envs/lax_dock
    vina_cpu: 1
    vina_exhaustiveness: 8
    vina_num_modes: 1
    box_source: centroid_fixed
    default_box_size: 12.0
  ai_reranking:
    enabled: true
    input_manifest: 04_metadata/benchmark_cases.tsv
    output_dir: 07_results/modules/ai_reranking
    backend: cpu_docking_rerank_v2
    # v3 is enhancement-line only. Keep v2 as default unless a separate experiment explicitly opts in.
    v3:
      missing_ligand_penalty: 0.35
      missing_pose_penalty: 0.65
      atom_delta_weight: 0.015
      torsdof_threshold: 12.0
      torsdof_weight: 0.025
      small_mw_floor: 180.0
      small_mw_weight: 0.01
      hetero_floor: 2.0
      hetero_weight: 0.55
      aromatic_fraction_threshold: 0.75
      aromatic_fraction_weight: 2.35
      simple_aromatic_penalty: 1.3
      polyaryl_hydrophobe_penalty: 0.7
      single_ring_background_penalty: 2.1
      case_aware_gating_enabled: true
      focused_flag_coverage_threshold: 0.8
  filtering:
    enabled: true
    input_manifest: 04_metadata/benchmark_cases.tsv
    output_dir: 07_results/modules/filtering
  clustering_and_prioritization:
    enabled: true
    input_manifest: 04_metadata/benchmark_cases.tsv
    output_dir: 07_results/modules/clustering_and_prioritization
    v3_priority:
      top1_only_gap: 0.75
      top2_gap: 0.35
      mid_gap_shortlist_cap: 2
  report_generation:
    enabled: true
    input_manifest: 04_metadata/benchmark_cases.tsv
    output_dir: 07_results/modules/report_generation
  benchmark_evaluation:
    enabled: true
    input_manifest: 04_metadata/benchmark_cases.tsv
    output_dir: 07_results/modules/benchmark_evaluation
  run_state_checker:
    enabled: true
    input_manifest: 04_metadata/benchmark_cases.tsv
    output_dir: 07_results/modules/run_state_checker
