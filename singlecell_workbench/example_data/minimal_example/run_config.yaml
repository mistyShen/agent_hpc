project_name: singlecell_workbench_minimal_example
output_dir: runs/minimal_example
samples:
- sample_id: ctrl_a
  condition: control
  input_path: data/ctrl_a/filtered_feature_bc_matrix
- sample_id: stim_b
  condition: treated
  input_path: data/stim_b/filtered_feature_bc_matrix.h5
schema:
  apply_fixes: true
  required_obs_columns:
  - sample_id
  - condition
qc:
  rna_modality: Gene Expression
  qc_vars:
  - mt
  solo:
    enabled: true
  scar:
    enabled: true
annotation:
  modality: Gene Expression
  method_priority:
  - scarches_scanvi
  - celltypist
  - unassigned
  placeholder_label: unassigned
  fallback_label: unassigned
stats:
  modality: Gene Expression
  cell_type_column: cell_type
  sample_column: sample_id
  condition_column: condition
  run_decoupler: true
reports:
  title: Single-cell Workbench Minimal Example
